# Publishes the VS Code extension to the Marketplace when you push a tag
# like `vscode-v0.3.0`. Requires the VSCE_PAT repo secret (Azure DevOps PAT
# with Marketplace > Manage scope, for the publisher in package.json).
name: release-vscode

on:
  push:
    tags: ["vscode-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npx tsc -p .
      - run: npx vitest run
      - run: npx vsce package --allow-missing-repository
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: editors/vscode/*.vsix
      - name: publish to the Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT"
